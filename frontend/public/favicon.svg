<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <rect width="256" height="256" rx="40" fill="#12203A"/>

  <!-- ground line -->
  <line x1="38" y1="176" x2="218" y2="176" stroke="#1B2A47" stroke-width="6" stroke-linecap="round"/>

  <!-- car body: simple line-art silhouette -->
  <path d="M50 168
           C50 168 56 132 74 120
           C88 111 102 108 116 108
           L152 108
           C166 108 180 112 192 122
           C204 131 210 150 210 168"
        fill="none" stroke="#C9A25D" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- roofline -->
  <path d="M86 118
           C92 96 106 84 128 84
           C150 84 164 96 170 118"
        fill="none" stroke="#C9A25D" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- body baseline -->
  <path d="M50 168 L210 168" stroke="#C9A25D" stroke-width="8" stroke-linecap="round"/>

  <!-- front and rear bumps -->
  <path d="M46 168 C46 158 50 150 60 150" fill="none" stroke="#C9A25D" stroke-width="8" stroke-linecap="round"/>
  <path d="M214 168 C214 158 210 150 200 150" fill="none" stroke="#C9A25D" stroke-width="8" stroke-linecap="round"/>

  <!-- wheels -->
  <circle cx="88" cy="176" r="20" fill="#12203A" stroke="#E9ECF2" stroke-width="7"/>
  <circle cx="172" cy="176" r="20" fill="#12203A" stroke="#E9ECF2" stroke-width="7"/>
  <circle cx="88" cy="176" r="6" fill="#E9ECF2"/>
  <circle cx="172" cy="176" r="6" fill="#E9ECF2"/>

  <!-- headlight accent -->
  <circle cx="200" cy="140" r="5" fill="#E9ECF2"/>
</svg>
